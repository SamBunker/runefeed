services:
  # ── RuneFeed Server — WebSocket API ──
  # Polls the OSRS Wiki API, detects spikes, broadcasts to clients.
  runefeed-server:
    image: ghcr.io/sambunker/runefeed:latest
    ports:
      - "3900:3900"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    networks:
      - d-nginx_default
    restart: unless-stopped

networks:
  d-nginx_default:
    external: true
